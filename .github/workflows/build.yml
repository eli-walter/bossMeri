name: Build Boss Meri Android APK

on:
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Node dependencies
      run: npm install

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli@^8.3.1

    - name: Build React app
      env:
        REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
      run: npm run build

    - name: Add Android platform
      run: npx cap add android || echo "Android platform already exists"

    - name: Sync Capacitor with Android
      run: npx cap sync android

    - name: Prepare assets folder for @capacitor/assets
      run: |
        mkdir -p assets
        cp public/assets/icon.png assets/icon-only.png
        cp public/assets/splash.png assets/splash.png

    - name: Generate Android icons and splash
      run: |
        npm install -g @capacitor/assets
        npx @capacitor/assets generate --android \
          --iconBackgroundColor '#ffffff' \
          --splashBackgroundColor '#4A0080' \
          --androidProject android

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x ./gradlew

    - name: Build Android Debug APK
      working-directory: android
      run: ./gradlew assembleDebug --stacktrace

    - name: Rename APK
      run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Boss-Meri.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Boss-Meri
        path: android/app/build/outputs/apk/debug/Boss-Meri.apk
        retention-days: 30
