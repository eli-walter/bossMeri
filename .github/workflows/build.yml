name: Build Boss Meri Android APK

on:
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Node dependencies
      run: npm install

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli

    - name: Build React app
      env:
        REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
      run: npm run build

    - name: Initialize Capacitor (if needed)
      run: |
        if [ ! -f "capacitor.config.json" ]; then
          npx cap init "Boss Meri" "com.meresimi.bossmeri" --web-dir=build
        fi

    - name: Add Android platform
      run: npx cap add android || echo "Android platform already exists"

    - name: Sync Capacitor with Android
      run: npx cap sync android

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x ./gradlew

    - name: Build Android Debug APK
      working-directory: android
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: boss-meri-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Android Release APK (unsigned)
      working-directory: android
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: boss-meri-release-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
